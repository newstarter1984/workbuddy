<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="元宝学习小世界">
  <meta name="theme-color" content="#4a8c2a">
  <link rel="manifest" href="./manifest.json">
  <title>元宝学习小世界</title>
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>

  <style>
    /* ===== 像素字体模拟 ===== */
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    :root {
      --sky-top: #87CEEB;
      --sky-bot: #c5e8f7;
      --ground: #4a8c2a;
      --dirt: #8B6914;
      --stone: #7a7a7a;
      --ui-bg: rgba(30,20,10,0.82);
      --ui-border: #a08040;
      --ui-border2: #503010;
      --text-main: #fffde0;
      --text-accent: #ffe040;
      --stroke-color: #ffe040;
      --outline-color: #335544;
      --btn-green: #4caf50;
      --btn-brown: #8B6914;
      --pixel: 3px; /* block border size */
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      font-family: 'Press Start 2P', 'Courier New', monospace;
      background: var(--sky-top);
      overflow-x: hidden;
      transition: background 2s ease;
      position: relative;
    }

    /* ===== 天空背景动画层 ===== */
    #sky-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ===== 地面装饰 ===== */
    .ground-strip {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 48px;
      background: repeating-linear-gradient(
        90deg,
        var(--ground) 0 32px,
        #3a7a1a 32px 64px
      );
      border-top: var(--pixel) solid #2d5a10;
      z-index: 1;
      image-rendering: pixelated;
    }
    .ground-strip::before {
      content:'';
      position: absolute;
      top: var(--pixel); left: 0; right: 0;
      height: 16px;
      background: repeating-linear-gradient(
        90deg,
        var(--dirt) 0 32px,
        #7a5810 32px 64px
      );
    }

    /* ===== 像素云朵 ===== */
    .cloud {
      position: fixed;
      width: 96px; height: 48px;
      background: white;
      image-rendering: pixelated;
      z-index: 1;
      animation: cloudMove linear infinite;
      opacity: 0.9;
    }
    .cloud::before {
      content:'';
      position: absolute;
      width: 48px; height: 32px;
      background: white;
      top: -20px; left: 16px;
    }
    .cloud::after {
      content:'';
      position: absolute;
      width: 32px; height: 24px;
      background: white;
      top: -12px; right: 8px;
    }
    @keyframes cloudMove {
      from { transform: translateX(-150px); }
      to { transform: translateX(calc(100vw + 150px)); }
    }

    /* ===== 像素星星（夜晚） ===== */
    .star {
      position: fixed;
      width: 4px; height: 4px;
      background: #fff;
      z-index: 1;
      animation: twinkle 2s ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: 0.3; }
      to { opacity: 1; }
    }

    /* ===== 主内容 ===== */
    .main-wrap {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 16px 80px;
    }

    /* ===== 大标题 ===== */
    .game-title {
      text-align: center;
      margin-bottom: 16px;
      padding: 14px 18px 10px;
      background: var(--ui-bg);
      border: var(--pixel) solid var(--ui-border);
      box-shadow: var(--pixel) var(--pixel) 0 var(--ui-border2),
                  inset 1px 1px 0 rgba(255,255,255,0.1);
      image-rendering: pixelated;
      width: 100%;
      max-width: 500px;
    }
    .game-title h1 {
      font-size: clamp(0.75rem, 3.5vw, 1.1rem);
      color: var(--text-accent);
      letter-spacing: 0.05em;
      text-shadow: 3px 3px 0 #7a5000, 0 0 20px rgba(255,200,0,0.6);
      line-height: 1.5;
    }
    .game-title .subtitle {
      font-size: clamp(0.4rem, 1.8vw, 0.55rem);
      color: #aad080;
      margin-top: 6px;
      letter-spacing: 0.1em;
    }

    /* ===== 主题状态栏 ===== */
    .theme-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 500px;
      margin-bottom: 12px;
      padding: 6px 12px;
      background: var(--ui-bg);
      border: 2px solid var(--ui-border2);
      font-size: 0.45rem;
      color: #aad080;
    }
    .theme-bar .time-display { color: var(--text-accent); }
    .theme-bar .theme-name { color: #80d0ff; }
    .theme-bar .next-change { color: #ff8080; }

    /* ===== 输入面板 ===== */
    .input-panel {
      width: 100%;
      max-width: 500px;
      margin-bottom: 16px;
      background: var(--ui-bg);
      border: var(--pixel) solid var(--ui-border);
      box-shadow: var(--pixel) var(--pixel) 0 var(--ui-border2);
      padding: 14px;
    }
    .input-label {
      font-size: 0.5rem;
      color: #aad080;
      display: block;
      margin-bottom: 8px;
      letter-spacing: 0.1em;
    }
    .char-input {
      width: 100%;
      padding: 16px 20px;
      font-size: 2rem;
      background: rgba(0,0,0,0.6);
      color: var(--text-accent);
      border: var(--pixel) solid var(--ui-border);
      outline: none;
      text-align: center;
      font-family: 'Microsoft YaHei', sans-serif;
      letter-spacing: 0.3em;
      caret-color: var(--text-accent);
      transition: border-color 0.2s;
      image-rendering: pixelated;
    }
    .char-input:focus {
      border-color: #ffe040;
      box-shadow: 0 0 0 2px rgba(255,220,0,0.3), inset 0 0 8px rgba(0,0,0,0.5);
    }
    .char-input::placeholder {
      font-size: 0.9rem;
      color: #7a6a40;
      font-family: 'Microsoft YaHei', sans-serif;
    }

    /* ===== 显示面板 ===== */
    .display-panel {
      width: 100%;
      max-width: 500px;
      background: var(--ui-bg);
      border: var(--pixel) solid var(--ui-border);
      box-shadow: var(--pixel) var(--pixel) 0 var(--ui-border2);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 汉字展示区 */
    .character-wrap {
      width: 260px; height: 260px;
      position: relative;
      margin-bottom: 16px;
    }
    /* 格子背景 */
    .character-wrap::before {
      content:'';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255,220,0,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,220,0,0.06) 1px, transparent 1px);
      background-size: 65px 65px;
      border: 2px solid rgba(255,220,0,0.15);
      pointer-events: none;
      z-index: 2;
    }
    #character-target {
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 1;
    }

    /* 占位汉字 */
    .placeholder-char {
      font-size: 10rem;
      color: rgba(255,255,255,0.06);
      user-select: none;
      font-family: 'Microsoft YaHei', sans-serif;
      line-height: 260px;
      text-align: center;
    }

    /* 拼音展示 */
    .pinyin-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .pinyin-badge {
      padding: 6px 20px;
      background: rgba(255,220,0,0.12);
      border: 2px solid var(--ui-border);
      font-size: 1.6rem;
      color: var(--text-accent);
      font-family: 'Microsoft YaHei', sans-serif;
      letter-spacing: 0.2em;
      text-shadow: 0 0 12px rgba(255,200,0,0.6);
    }

    /* 组词展示 */
    .words-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 16px;
    }
    .word-block {
      padding: 8px 18px;
      background: rgba(74,140,42,0.25);
      border: 2px solid #4a8c2a;
      color: #aaf080;
      font-size: 1.1rem;
      font-family: 'Microsoft YaHei', sans-serif;
      cursor: default;
      transition: all 0.15s;
      image-rendering: pixelated;
    }
    .word-block:hover {
      background: rgba(74,140,42,0.5);
      transform: translateY(-2px);
    }

    /* 操作按钮行 */
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .mc-btn {
      padding: 10px 18px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      border: none;
      cursor: pointer;
      border-bottom: var(--pixel) solid rgba(0,0,0,0.5);
      border-right: var(--pixel) solid rgba(0,0,0,0.5);
      border-top: var(--pixel) solid rgba(255,255,255,0.3);
      border-left: var(--pixel) solid rgba(255,255,255,0.3);
      transition: all 0.1s;
      image-rendering: pixelated;
      letter-spacing: 0.05em;
    }
    .mc-btn:active { transform: translate(2px, 2px); border-bottom: none; border-right: none; }
    .mc-btn-green { background: #4caf50; color: #fff; }
    .mc-btn-green:hover { background: #66cc66; }
    .mc-btn-brown { background: #8B6914; color: #ffe; }
    .mc-btn-brown:hover { background: #a07818; }
    .mc-btn-blue { background: #2c7bb5; color: #fff; }
    .mc-btn-blue:hover { background: #3a8fcc; }
    .mc-btn-red { background: #c0392b; color: #fff; }
    .mc-btn-red:hover { background: #e74c3c; }

    /* 错误提示 */
    .error-msg {
      font-size: 0.5rem;
      color: #ff6060;
      margin-top: 10px;
      min-height: 18px;
      letter-spacing: 0.05em;
      font-family: 'Microsoft YaHei', sans-serif;
    }

    /* ===== 添加到桌面横幅 ===== */
    #install-banner {
      position: fixed;
      bottom: 58px;
      left: 0; right: 0;
      z-index: 100;
      display: none;
      justify-content: center;
    }
    .install-box {
      background: var(--ui-bg);
      border: var(--pixel) solid var(--ui-border);
      box-shadow: var(--pixel) var(--pixel) 0 var(--ui-border2);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 440px;
      width: calc(100% - 32px);
    }
    .install-box .install-text {
      flex: 1;
      font-size: 0.45rem;
      color: var(--text-main);
      line-height: 1.8;
      font-family: 'Microsoft YaHei', sans-serif;
    }
    .install-box .install-icon {
      font-size: 1.8rem;
    }

    /* iOS提示 */
    #ios-hint {
      display: none;
      position: fixed;
      bottom: 58px;
      left: 0; right: 0;
      z-index: 100;
      justify-content: center;
    }
    .ios-hint-box {
      background: var(--ui-bg);
      border: var(--pixel) solid var(--ui-border);
      padding: 14px 16px;
      max-width: 440px;
      width: calc(100% - 32px);
      text-align: center;
    }
    .ios-hint-box p {
      font-size: 0.5rem;
      color: var(--text-main);
      line-height: 2;
      font-family: 'Microsoft YaHei', sans-serif;
    }
    .ios-hint-box .arrow-down {
      font-size: 1.5rem;
      color: var(--text-accent);
      display: block;
      margin-top: 4px;
    }

    /* 像素进度条 */
    .progress-bar-wrap {
      width: 100%;
      height: 8px;
      background: rgba(0,0,0,0.5);
      border: 1px solid #555;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4caf50, #ffe040);
      transition: width 1s linear;
    }

    /* 像素爆炸颗粒动画 */
    @keyframes pixel-burst {
      0% { transform: scale(0) rotate(0deg); opacity: 1; }
      100% { transform: scale(1) rotate(180deg) translate(30px, -40px); opacity: 0; }
    }

    /* 手机适配 */
    @media (max-width: 480px) {
      .character-wrap { width: 220px; height: 220px; }
      .character-wrap::before { background-size: 55px 55px; }
      .pinyin-badge { font-size: 1.3rem; }
      .game-title h1 { font-size: 0.75rem; }
    }

    /* 暗色主题过渡 */
    body.night-mode {
      --ui-bg: rgba(5,5,25,0.88);
      --ui-border: #304080;
      --ui-border2: #101040;
      --text-main: #c0d0ff;
      --text-accent: #80c0ff;
      --stroke-color: #80c0ff;
      --outline-color: #112244;
      --btn-green: #2255aa;
      --ground: #1a1a3a;
      --dirt: #101030;
    }

    /* 主题过渡 */
    body, .main-wrap, .game-title, .input-panel, .display-panel, .theme-bar {
      transition: background-color 2s ease, border-color 1s ease, color 1s ease;
    }
  </style>
</head>
<body>

<!-- 天空画布 -->
<canvas id="sky-canvas"></canvas>

<!-- 地面装饰 -->
<div class="ground-strip"></div>

<!-- 主题状态栏 -->
<div class="main-wrap">

  <!-- 大标题 -->
  <div class="game-title">
    <h1>🌍 元宝学习小世界 🌍</h1>
    <p class="subtitle">✦ YUANBAO HANZI WORLD ✦</p>
  </div>

  <!-- 主题/时间状态栏 -->
  <div class="theme-bar">
    <span class="time-display" id="clock">⏰ 00:00</span>
    <span class="theme-name" id="theme-name">🌅 清晨的世界</span>
    <span class="next-change" id="next-change">⏳ 10:00</span>
  </div>
  <div class="progress-bar-wrap" style="width:100%;max-width:500px;margin-bottom:12px;">
    <div class="progress-bar-fill" id="theme-progress" style="width:0%"></div>
  </div>

  <!-- 输入面板 -->
  <div class="input-panel">
    <label class="input-label">▶ 用拼音输入法输入汉字，回车展示笔顺</label>
    <input
      type="text"
      id="charInput"
      class="char-input"
      placeholder="在这里输入汉字 …"
      autocomplete="off"
      autofocus
      maxlength="8"
    >
  </div>

  <!-- 展示面板 -->
  <div class="display-panel">
    <div class="character-wrap">
      <div id="character-target">
        <div class="placeholder-char">字</div>
      </div>
    </div>

    <div class="pinyin-row">
      <div class="pinyin-badge" id="pinyinShow"></div>
    </div>

    <div class="words-row" id="wordsShow"></div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="btn-row" id="controls" style="display:none;">
      <button class="mc-btn mc-btn-green" onclick="replayAnim()">▶ 重播笔顺</button>
      <button class="mc-btn mc-btn-brown" onclick="showFullChar()">📖 显示全字</button>
    </div>

    <!-- 添加到桌面按钮 -->
    <div class="btn-row" style="margin-top:14px;">
      <button class="mc-btn mc-btn-blue" id="install-btn" style="display:none;" onclick="installApp()">
        📱 添加到桌面
      </button>
      <button class="mc-btn mc-btn-blue" id="ios-install-btn" style="display:none;" onclick="showIOSHint()">
        📱 添加到桌面
      </button>
    </div>
  </div>

</div><!-- /main-wrap -->

<!-- 安装横幅（Android/Desktop） -->
<div id="install-banner">
  <div class="install-box">
    <span class="install-icon">📦</span>
    <span class="install-text">把「元宝学习小世界」添加到桌面，随时使用！</span>
    <button class="mc-btn mc-btn-green" onclick="installApp()">安装</button>
    <button class="mc-btn mc-btn-brown" onclick="dismissBanner()">✕</button>
  </div>
</div>

<!-- iOS 安装提示 -->
<div id="ios-hint">
  <div class="ios-hint-box">
    <p>点击浏览器底部 <strong>分享按钮</strong>（方框+箭头）</p>
    <p>然后选择 <strong>「添加到主屏幕」</strong></p>
    <span class="arrow-down">↓</span>
  </div>
</div>

<script>
// ============================================================
//  主题定义：10个主题（5白天 + 5夜晚）
// ============================================================
const THEMES = [
  // ——— 白天 5个 ———
  {
    id: 'dawn',       name: '🌅 黎明的世界',  isDay: true,
    skyTop: '#FF7043', skyBot: '#FFB300',
    ground: '#3d7a1a', strokeColor: '#FF7043', outlineColor: '#3a2a10',
    uiBorder: '#FF7043', stars: false, clouds: true, cloudColor: '#FFE0B2',
    fog: false,
  },
  {
    id: 'morning',    name: '☀️ 早晨的世界',  isDay: true,
    skyTop: '#64B5F6', skyBot: '#E3F2FD',
    ground: '#4a8c2a', strokeColor: '#FFE040', outlineColor: '#335544',
    uiBorder: '#a08040', stars: false, clouds: true, cloudColor: '#ffffff',
    fog: false,
  },
  {
    id: 'noon',       name: '🌞 正午的世界',  isDay: true,
    skyTop: '#1E88E5', skyBot: '#90CAF9',
    ground: '#4a8c2a', strokeColor: '#FFF176', outlineColor: '#1a3310',
    uiBorder: '#ffcc00', stars: false, clouds: true, cloudColor: '#ffffff',
    fog: false,
  },
  {
    id: 'afternoon',  name: '⛅ 下午的世界',  isDay: true,
    skyTop: '#42A5F5', skyBot: '#FFCC80',
    ground: '#388e1a', strokeColor: '#FFD54F', outlineColor: '#224422',
    uiBorder: '#FFA726', stars: false, clouds: true, cloudColor: '#ffe0b2',
    fog: false,
  },
  {
    id: 'sunset',     name: '🌇 黄昏的世界',  isDay: true,
    skyTop: '#BF360C', skyBot: '#FF6F00',
    ground: '#2d5a10', strokeColor: '#FF8A65', outlineColor: '#1a1000',
    uiBorder: '#FF5722', stars: false, clouds: true, cloudColor: '#FF7043',
    fog: false,
  },
  // ——— 夜晚 5个 ———
  {
    id: 'dusk',       name: '🌆 傍晚的世界',  isDay: false,
    skyTop: '#1A237E', skyBot: '#4527A0',
    ground: '#1a2e10', strokeColor: '#CE93D8', outlineColor: '#0d0d20',
    uiBorder: '#7E57C2', stars: true, clouds: false, cloudColor: '',
    fog: false,
  },
  {
    id: 'night',      name: '🌙 星夜的世界',  isDay: false,
    skyTop: '#0D0D2B', skyBot: '#0A1628',
    ground: '#0d1a08', strokeColor: '#80D8FF', outlineColor: '#050515',
    uiBorder: '#0288D1', stars: true, clouds: false, cloudColor: '',
    fog: false,
  },
  {
    id: 'moon',       name: '🌕 满月的世界',  isDay: false,
    skyTop: '#1B2A3B', skyBot: '#0D1B2A',
    ground: '#101d08', strokeColor: '#B2EBF2', outlineColor: '#080c18',
    uiBorder: '#26C6DA', stars: true, clouds: false, cloudColor: '',
    fog: false,
  },
  {
    id: 'rain',       name: '🌧️ 雨夜的世界',  isDay: false,
    skyTop: '#263238', skyBot: '#37474F',
    ground: '#0d1508', strokeColor: '#80CBC4', outlineColor: '#0a1012',
    uiBorder: '#26A69A', stars: false, clouds: true, cloudColor: '#546E7A',
    fog: true,
  },
  {
    id: 'aurora',     name: '🌌 极光的世界',  isDay: false,
    skyTop: '#004D40', skyBot: '#0D1B2A',
    ground: '#0a1005', strokeColor: '#A5D6A7', outlineColor: '#021008',
    uiBorder: '#43A047', stars: true, clouds: false, cloudColor: '',
    fog: false,
  },
];

// ============================================================
//  时间 & 主题逻辑
// ============================================================
let currentThemeIndex = 0;
let themeStartTime = Date.now();
const THEME_INTERVAL = 10 * 60 * 1000; // 10分钟

function getTimeBasedThemePool() {
  const h = new Date().getHours();
  // 白天：6~18点 → 白天主题；其余 → 夜晚主题
  const dayThemes   = THEMES.filter(t => t.isDay);
  const nightThemes = THEMES.filter(t => !t.isDay);
  if (h >= 6 && h < 18) return dayThemes;
  // 黄昏过渡
  if (h >= 5 && h < 6) return [THEMES.find(t=>t.id==='dawn'), ...nightThemes];
  if (h >= 18 && h < 20) return [THEMES.find(t=>t.id==='sunset'), ...nightThemes];
  return nightThemes;
}

function pickThemeByTime() {
  const pool = getTimeBasedThemePool();
  // 按10分钟轮换
  const idx = Math.floor(Date.now() / THEME_INTERVAL) % pool.length;
  return pool[idx];
}

function applyTheme(theme) {
  const root = document.documentElement;
  // 天空
  document.body.style.background = `linear-gradient(180deg, ${theme.skyTop} 0%, ${theme.skyBot} 70%, ${theme.ground} 100%)`;

  // CSS变量
  root.style.setProperty('--stroke-color', theme.strokeColor);
  root.style.setProperty('--outline-color', theme.outlineColor);
  root.style.setProperty('--ui-border', theme.uiBorder);
  root.style.setProperty('--ground', theme.ground);

  if (!theme.isDay) {
    document.body.classList.add('night-mode');
  } else {
    document.body.classList.remove('night-mode');
  }

  // 更新 hanziWriter 颜色
  if (writer) {
    writer.updateColor('strokeColor', theme.strokeColor);
    writer.updateColor('outlineColor', theme.outlineColor);
  }

  // 重绘天空
  drawSky(theme);

  document.getElementById('theme-name').textContent = theme.name;
}

// ============================================================
//  Canvas 天空 & 粒子绘制
// ============================================================
const canvas = document.getElementById('sky-canvas');
const ctx = canvas.getContext('2d');
let animFrame;
let skyParticles = [];

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function drawSky(theme) {
  cancelAnimationFrame(animFrame);
  skyParticles = [];
  // 生成粒子（星星 or 云）
  if (theme.stars) {
    for (let i = 0; i < 80; i++) {
      skyParticles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height * 0.7,
        r: Math.random() * 2 + 1,
        alpha: Math.random(),
        speed: Math.random() * 0.015 + 0.005,
        type: 'star'
      });
    }
  }
  if (theme.clouds) {
    for (let i = 0; i < 4; i++) {
      skyParticles.push({
        x: Math.random() * canvas.width,
        y: 30 + Math.random() * 120,
        speed: 0.2 + Math.random() * 0.3,
        w: 80 + Math.random() * 80,
        color: theme.cloudColor,
        type: 'cloud'
      });
    }
  }
  if (theme.id === 'aurora') {
    for (let i = 0; i < 5; i++) {
      skyParticles.push({
        x: Math.random() * canvas.width,
        y: 20 + Math.random() * 120,
        w: 40 + Math.random() * 60,
        h: 80 + Math.random() * 120,
        hue: 120 + Math.random() * 80,
        alpha: 0.15 + Math.random() * 0.15,
        speed: 0.001,
        t: Math.random() * Math.PI * 2,
        type: 'aurora'
      });
    }
  }
  if (theme.fog) {
    for (let i = 0; i < 3; i++) {
      skyParticles.push({
        x: Math.random() * canvas.width,
        y: canvas.height * 0.4 + Math.random() * canvas.height * 0.3,
        w: 200 + Math.random() * 200,
        alpha: 0.08 + Math.random() * 0.07,
        speed: 0.05 + Math.random() * 0.1,
        type: 'fog'
      });
    }
  }
  animateSky(theme);
}

function animateSky(theme) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  skyParticles.forEach(p => {
    if (p.type === 'star') {
      p.alpha += p.speed * (Math.random() > 0.5 ? 1 : -1);
      p.alpha = Math.max(0.1, Math.min(1, p.alpha));
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = '#fff';
      // 像素星星
      ctx.fillRect(p.x - 2, p.y, 4, 1);
      ctx.fillRect(p.x, p.y - 2, 1, 4);
      ctx.restore();
    } else if (p.type === 'cloud') {
      p.x += p.speed;
      if (p.x > canvas.width + 200) p.x = -200;
      drawPixelCloud(p.x, p.y, p.w, p.color);
    } else if (p.type === 'aurora') {
      p.t += p.speed;
      const yOff = Math.sin(p.t) * 20;
      ctx.save();
      const grad = ctx.createLinearGradient(p.x, p.y + yOff, p.x + p.w, p.y + p.h + yOff);
      grad.addColorStop(0, `hsla(${p.hue}, 80%, 60%, 0)`);
      grad.addColorStop(0.5, `hsla(${p.hue}, 80%, 60%, ${p.alpha})`);
      grad.addColorStop(1, `hsla(${p.hue + 40}, 80%, 60%, 0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(p.x + p.w/2, p.y + p.h/2 + yOff, p.w/2, p.h/2, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    } else if (p.type === 'fog') {
      p.x += p.speed;
      if (p.x > canvas.width + 300) p.x = -300;
      ctx.save();
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.w);
      grad.addColorStop(0, `rgba(180,200,220,${p.alpha})`);
      grad.addColorStop(1, `rgba(180,200,220,0)`);
      ctx.fillStyle = grad;
      ctx.fillRect(p.x - p.w, p.y - 40, p.w * 2, 80);
      ctx.restore();
    }
  });
  animFrame = requestAnimationFrame(() => animateSky(theme));
}

function drawPixelCloud(x, y, w, color) {
  const h = w * 0.35;
  ctx.save();
  ctx.globalAlpha = 0.82;
  ctx.fillStyle = color || '#fff';
  // 主体
  ctx.fillRect(x, y, w, h);
  // 凸起
  ctx.fillRect(x + w*0.15, y - h*0.5, w*0.35, h*0.6);
  ctx.fillRect(x + w*0.45, y - h*0.3, w*0.25, h*0.4);
  ctx.restore();
}

// ============================================================
//  时钟 & 主题进度条
// ============================================================
function updateClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `⏰ ${hh}:${mm}:${ss}`;

  // 距离下次切换倒计时
  const elapsed = Date.now() % THEME_INTERVAL;
  const remain  = THEME_INTERVAL - elapsed;
  const rm = String(Math.floor(remain / 60000)).padStart(2,'0');
  const rs = String(Math.floor((remain % 60000) / 1000)).padStart(2,'0');
  document.getElementById('next-change').textContent = `⏳ ${rm}:${rs}`;

  // 进度条
  const pct = (elapsed / THEME_INTERVAL) * 100;
  document.getElementById('theme-progress').style.width = pct + '%';
}

// ============================================================
//  主题定时轮换
// ============================================================
let lastThemeId = null;
function checkTheme() {
  const t = pickThemeByTime();
  if (t.id !== lastThemeId) {
    lastThemeId = t.id;
    applyTheme(t);
  }
}
checkTheme();
setInterval(checkTheme, 10000); // 每10秒检查一次（主题变化时才切换）
setInterval(updateClock, 1000);
updateClock();

// ============================================================
//  汉字展示逻辑
// ============================================================
let writer = null;

document.getElementById('charInput').addEventListener('input', function() {
  const val = this.value.trim();
  if (val.length > 0) processChar(val[0]);
});
document.getElementById('charInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    const val = this.value.trim();
    if (val.length > 0) processChar(val[0]);
  }
});

function processChar(char) {
  const info = charDatabase[char];
  const errEl = document.getElementById('errorMsg');
  const ctrlEl = document.getElementById('controls');
  errEl.textContent = '';
  if (info) {
    ctrlEl.style.display = 'flex';
    renderWriter(char);
    document.getElementById('pinyinShow').textContent = info.pinyin;
    document.getElementById('wordsShow').innerHTML =
      info.words.map(w => `<span class="word-block">${w}</span>`).join('');
  } else {
    errEl.textContent = `暂不支持汉字 "${char}" 的笔顺数据`;
    document.getElementById('pinyinShow').textContent = '';
    document.getElementById('wordsShow').innerHTML = '';
    ctrlEl.style.display = 'none';
    document.getElementById('character-target').innerHTML = '<div class="placeholder-char">字</div>';
  }
}

function renderWriter(char) {
  const t = pickThemeByTime();
  document.getElementById('character-target').innerHTML = '';
  writer = HanziWriter.create('character-target', char, {
    width: 260, height: 260, padding: 12,
    showOutline: true, showCharacter: false,
    strokeColor: t.strokeColor,
    outlineColor: t.outlineColor,
    strokeAnimationSpeed: 1,
    delayBetweenStrokes: 150,
    onLoadCharDataSuccess: () => writer.animateCharacter(),
    onLoadCharDataError: () => {
      document.getElementById('errorMsg').textContent = '笔顺数据加载失败，请检查网络';
    }
  });
}

function replayAnim() {
  if (writer) { writer.hideCharacter(); writer.animateCharacter(); }
}
function showFullChar() {
  if (writer) writer.showCharacter();
}

// ============================================================
//  PWA / 添加到桌面
// ============================================================
let deferredPrompt = null;

// 注册 Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// Android / Desktop Chrome
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-btn').style.display = 'inline-flex';
  document.getElementById('install-banner').style.display = 'flex';
});

function installApp() {
  document.getElementById('install-banner').style.display = 'none';
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('install-btn').style.display = 'none';
    });
  }
}

function dismissBanner() {
  document.getElementById('install-banner').style.display = 'none';
}

// iOS Safari
function isIOS() {
  return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
}
function isInStandaloneMode() {
  return window.navigator.standalone === true;
}
if (isIOS() && !isInStandaloneMode()) {
  document.getElementById('ios-install-btn').style.display = 'inline-flex';
}

function showIOSHint() {
  const hint = document.getElementById('ios-hint');
  hint.style.display = hint.style.display === 'flex' ? 'none' : 'flex';
}

// 点击任意处关闭 iOS 提示
document.addEventListener('click', (e) => {
  const hint = document.getElementById('ios-hint');
  if (hint.style.display === 'flex' && !e.target.closest('#ios-hint') && !e.target.closest('#ios-install-btn')) {
    hint.style.display = 'none';
  }
});

// 自动聚焦
window.addEventListener('load', () => {
  document.getElementById('charInput').focus();
});
