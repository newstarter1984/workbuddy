<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="元宝学习小世界">
  <meta name="theme-color" content="#4a8c2a">
  <title>元宝学习小世界</title>
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    :root {
      --sky-top: #64B5F6;
      --sky-bot: #E3F2FD;
      --ground: #4a8c2a;
      --dirt: #8B6914;
      --ui-bg: rgba(30,20,10,0.88);
      --ui-border: #a08040;
      --ui-border2: #503010;
      --text-main: #fffde0;
      --text-accent: #ffe040;
      --stroke-color: #ffe040;
      --outline-color: #335544;
      --pixel: 3px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      font-family: 'Press Start 2P', 'Courier New', monospace;
      background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bot) 65%, var(--ground) 100%);
      overflow-x: hidden;
      transition: background 2.5s ease;
      position: relative;
    }

    /* ===== 背景画布 ===== */
    #bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ===== 地面 ===== */
    .ground-strip {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 48px;
      background: repeating-linear-gradient(90deg, var(--ground) 0 32px, #3a7a1a 32px 64px);
      border-top: var(--pixel) solid #2d5a10;
      z-index: 1;
    }
    .ground-strip::before {
      content:'';
      position: absolute;
      top: var(--pixel); left: 0; right: 0;
      height: 16px;
      background: repeating-linear-gradient(90deg, var(--dirt) 0 32px, #7a5810 32px 64px);
    }

    /* ===== 角色行走区域 ===== */
    #char-run-area {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 90px;
      z-index: 5;
      overflow: hidden;
      pointer-events: none;
    }

    /* ===== 顶部信息栏 ===== */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--ui-bg);
      border-bottom: 2px solid var(--ui-border2);
      font-size: 0.45rem;
    }
    .top-bar .time-box {
      color: var(--text-accent);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .top-bar .time-icon { font-size: 0.7rem; }
    .top-bar .duration-box {
      color: #80d0ff;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .top-bar .duration-icon { font-size: 0.7rem; }

    /* ===== 主内容 ===== */
    .main-wrap {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 16px 80px;
    }

    /* ===== 大标题 ===== */
    .game-title {
      text-align: center;
      margin-bottom: 14px;
      padding: 12px 16px 8px;
      background: var(--ui-bg);
      border: var(--pixel) solid var(--ui-border);
      box-shadow: var(--pixel) var(--pixel) 0 var(--ui-border2),
                  inset 1px 1px 0 rgba(255,255,255,0.08);
      width: 100%;
      max-width: 500px;
    }
    .game-title h1 {
      font-size: clamp(0.7rem, 3.5vw, 1rem);
      color: var(--text-accent);
      text-shadow: 3px 3px 0 #7a5000, 0 0 20px rgba(255,200,0,0.5);
      line-height: 1.6;
    }
    .game-title .subtitle {
      font-size: clamp(0.38rem, 1.8vw, 0.5rem);
      color: #aad080;
      margin-top: 6px;
      letter-spacing: 0.1em;
    }

    /* ===== 输入面板 ===== */
    .input-panel {
      width: 100%;
      max-width: 500px;
      margin-bottom: 14px;
      background: var(--ui-bg);
      border: var(--pixel) solid var(--ui-border);
      box-shadow: var(--pixel) var(--pixel) 0 var(--ui-border2);
      padding: 14px;
    }
    .input-label {
      font-size: 0.48rem;
      color: #aad080;
      display: block;
      margin-bottom: 8px;
      letter-spacing: 0.08em;
    }
    .char-input {
      width: 100%;
      padding: 16px 20px;
      font-size: 2.2rem;
      background: rgba(0,0,0,0.65);
      color: var(--text-accent);
      border: var(--pixel) solid var(--ui-border);
      outline: none;
      text-align: center;
      font-family: 'Microsoft YaHei', sans-serif;
      letter-spacing: 0.3em;
      caret-color: var(--text-accent);
      transition: border-color 0.2s;
    }
    .char-input:focus {
      border-color: #ffe040;
      box-shadow: 0 0 0 2px rgba(255,220,0,0.25), inset 0 0 8px rgba(0,0,0,0.5);
    }
    .char-input::placeholder {
      font-size: 0.9rem;
      color: #7a6a40;
      font-family: 'Microsoft YaHei', sans-serif;
      letter-spacing: 0.05em;
    }

    /* ===== 展示面板 ===== */
    .display-panel {
      width: 100%;
      max-width: 500px;
      background: var(--ui-bg);
      border: var(--pixel) solid var(--ui-border);
      box-shadow: var(--pixel) var(--pixel) 0 var(--ui-border2);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 汉字展示区 */
    .character-wrap {
      width: 260px; height: 260px;
      position: relative;
      margin-bottom: 14px;
    }
    .character-wrap::before {
      content:'';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(255,220,0,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,220,0,0.05) 1px, transparent 1px);
      background-size: 65px 65px;
      border: 2px solid rgba(255,220,0,0.12);
      pointer-events: none;
      z-index: 2;
    }
    #character-target {
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 1;
    }
    .placeholder-char {
      font-size: 9rem;
      color: rgba(255,255,255,0.06);
      user-select: none;
      font-family: 'Microsoft YaHei', sans-serif;
      line-height: 260px;
      text-align: center;
    }

    /* 拼音 */
    .pinyin-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .pinyin-badge {
      padding: 6px 22px;
      background: rgba(255,220,0,0.1);
      border: 2px solid var(--ui-border);
      font-size: 1.6rem;
      color: var(--text-accent);
      font-family: 'Microsoft YaHei', sans-serif;
      letter-spacing: 0.2em;
      text-shadow: 0 0 12px rgba(255,200,0,0.5);
    }

    /* 组词 */
    .words-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 14px;
    }
    .word-block {
      padding: 8px 18px;
      background: rgba(74,140,42,0.22);
      border: 2px solid #4a8c2a;
      color: #aaf080;
      font-size: 1.1rem;
      font-family: 'Microsoft YaHei', sans-serif;
      cursor: default;
      transition: all 0.15s;
    }
    .word-block:hover {
      background: rgba(74,140,42,0.45);
      transform: translateY(-2px);
    }

    /* 错误 */
    .error-msg {
      font-size: 0.48rem;
      color: #ff7070;
      margin-bottom: 10px;
      min-height: 18px;
      font-family: 'Microsoft YaHei', sans-serif;
    }

    /* 操作按钮行 */
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .mc-btn {
      padding: 10px 18px;
      font-family: 'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif;
      font-size: 0.85rem;
      font-weight: bold;
      border: none;
      cursor: pointer;
      border-bottom: var(--pixel) solid rgba(0,0,0,0.5);
      border-right: var(--pixel) solid rgba(0,0,0,0.5);
      border-top: var(--pixel) solid rgba(255,255,255,0.25);
      border-left: var(--pixel) solid rgba(255,255,255,0.25);
      transition: all 0.1s;
      letter-spacing: 0.05em;
    }
    .mc-btn:active { transform: translate(2px, 2px); border-bottom: none; border-right: none; }
    .mc-btn-green { background: #4caf50; color: #fff; }
    .mc-btn-green:hover { background: #66cc66; }
    .mc-btn-brown { background: #8B6914; color: #ffe; }
    .mc-btn-brown:hover { background: #a07818; }
    .mc-btn-blue { background: #2c7bb5; color: #fff; }
    .mc-btn-blue:hover { background: #3a8fcc; }
    .mc-btn-red { background: #c0392b; color: #fff; }
    .mc-btn-red:hover { background: #e74c3c; }

    /* 安装按钮 */
    .btn-row .mc-btn-install {
      margin-top: 12px;
    }

    /* 安装横幅 */
    #install-banner {
      position: fixed;
      bottom: 58px;
      left: 0; right: 0;
      z-index: 100;
      display: none;
      justify-content: center;
    }
    .install-box {
      background: var(--ui-bg);
      border: var(--pixel) solid var(--ui-border);
      box-shadow: var(--pixel) var(--pixel) 0 var(--ui-border2);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 440px;
      width: calc(100% - 32px);
    }
    .install-box .install-text {
      flex: 1;
      font-size: 0.45rem;
      color: var(--text-main);
      line-height: 1.8;
      font-family: 'Microsoft YaHei', sans-serif;
    }
    .install-box .install-icon { font-size: 1.6rem; }

    #ios-hint {
      display: none;
      position: fixed;
      bottom: 58px;
      left: 0; right: 0;
      z-index: 100;
      justify-content: center;
    }
    .ios-hint-box {
      background: var(--ui-bg);
      border: var(--pixel) solid var(--ui-border);
      padding: 14px 16px;
      max-width: 440px;
      width: calc(100% - 32px);
      text-align: center;
    }
    .ios-hint-box p {
      font-size: 0.5rem;
      color: var(--text-main);
      line-height: 2;
      font-family: 'Microsoft YaHei', sans-serif;
    }
    .ios-hint-box .arrow-down {
      font-size: 1.5rem;
      color: var(--text-accent);
      display: block;
      margin-top: 4px;
    }

    /* 手机 */
    @media (max-width: 480px) {
      .character-wrap { width: 220px; height: 220px; }
      .character-wrap::before { background-size: 55px 55px; }
      .placeholder-char { font-size: 7.5rem; }
      .pinyin-badge { font-size: 1.3rem; }
      .game-title h1 { font-size: 0.72rem; }
    }

    body.night-mode {
      --ui-bg: rgba(5,5,25,0.9);
      --ui-border: #304080;
      --ui-border2: #101040;
      --text-main: #c0d0ff;
      --text-accent: #80c0ff;
      --stroke-color: #80c0ff;
      --outline-color: #112244;
      --ground: #1a1a3a;
      --dirt: #101030;
    }

    body, .main-wrap, .game-title, .input-panel, .display-panel, .top-bar, .ground-strip { transition: background 2.5s ease, border-color 1s ease, color 1s ease; }
  </style>
</head>
<body>

<!-- 背景画布 -->
<canvas id="bg-canvas"></canvas>

<!-- 角色行走区域 -->
<div id="char-run-area"></div>

<!-- 顶部状态栏 -->
<div class="top-bar">
  <div class="time-box">
    <span class="time-icon">🕐</span>
    <span id="beijing-time">--:--:--</span>
  </div>
  <div class="duration-box">
    <span class="duration-icon">⏱</span>
    <span id="page-duration">已打开 00:00</span>
  </div>
</div>

<!-- 主内容 -->
<div class="main-wrap">

  <div class="game-title">
    <h1>🌍 元宝学习小世界 🌍</h1>
    <p class="subtitle">✦ YUANBAO HANZI WORLD ✦</p>
  </div>

  <div class="input-panel">
    <label class="input-label">▶ 用拼音输入法输入汉字，回车确认</label>
    <input
      type="text"
      id="charInput"
      class="char-input"
      placeholder="在这里输入汉字 …"
      autocomplete="off"
      maxlength="10"
    >
  </div>

  <div class="display-panel">
    <div class="character-wrap">
      <div id="character-target">
        <div class="placeholder-char">字</div>
      </div>
    </div>

    <div class="pinyin-row">
      <div class="pinyin-badge" id="pinyinShow"></div>
    </div>

    <div class="words-row" id="wordsShow"></div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="btn-row" id="controls" style="display:none;">
      <button class="mc-btn mc-btn-green" id="btn-replay">▶ 重播笔顺</button>
      <button class="mc-btn mc-btn-brown" id="btn-show">📖 显示全字</button>
    </div>

    <div class="btn-row">
      <button class="mc-btn mc-btn-blue mc-btn-install" id="install-btn" style="display:none;">📱 添加到桌面</button>
      <button class="mc-btn mc-btn-blue mc-btn-install" id="ios-install-btn" style="display:none;">📱 添加到桌面</button>
    </div>
  </div>

</div><!-- /main-wrap -->

<!-- 安装横幅 -->
<div id="install-banner">
  <div class="install-box">
    <span class="install-icon">📦</span>
    <span class="install-text">把「元宝学习小世界」添加到桌面，随时学习！</span>
    <button class="mc-btn mc-btn-green" id="banner-install-btn">安装</button>
    <button class="mc-btn mc-btn-brown" id="banner-dismiss-btn">✕</button>
  </div>
</div>

<!-- iOS 提示 -->
<div id="ios-hint">
  <div class="ios-hint-box">
    <p>点击浏览器底部 <strong>分享按钮</strong>（方框+箭头）</p>
    <p>然后选择 <strong>「添加到主屏幕」</strong></p>
    <span class="arrow-down">↓</span>
  </div>
</div>

<script>
// ============================================================
//  启动日志
// ============================================================
console.log('[启动] 元宝学习小世界 加载中...');
if (typeof HanziWriter === 'undefined') {
  console.error('[启动] ❌ HanziWriter 未加载！CDN 可能不可用');
} else {
  console.log('[启动] ✅ HanziWriter 加载成功，版本:', HanziWriter.version || '未知');
}

// ============================================================
//  10 个主题
// ============================================================
const THEMES = [
  { id:'dawn',      name:'🌅 黎明', isDay:true,  skyTop:'#FF7043', skyBot:'#FFB300', ground:'#3d7a1a', strokeColor:'#FF7043', outlineColor:'#3a2a10', uiBorder:'#FF7043', stars:false, clouds:true,  cloudColor:'#FFE0B2', fog:false },
  { id:'morning',   name:'☀️ 清晨', isDay:true,  skyTop:'#64B5F6', skyBot:'#E3F2FD', ground:'#4a8c2a', strokeColor:'#FFE040', outlineColor:'#335544', uiBorder:'#a08040',  stars:false, clouds:true,  cloudColor:'#ffffff',  fog:false },
  { id:'noon',      name:'🌞 正午', isDay:true,  skyTop:'#1E88E5', skyBot:'#90CAF9', ground:'#4a8c2a', strokeColor:'#FFF176', outlineColor:'#1a3310', uiBorder:'#ffcc00',  stars:false, clouds:true,  cloudColor:'#ffffff',  fog:false },
  { id:'afternoon', name:'⛅ 午后', isDay:true,  skyTop:'#42A5F5', skyBot:'#FFCC80', ground:'#388e1a', strokeColor:'#FFD54F', outlineColor:'#224422', uiBorder:'#FFA726',  stars:false, clouds:true,  cloudColor:'#ffe0b2', fog:false },
  { id:'sunset',    name:'🌇 黄昏', isDay:true,  skyTop:'#BF360C', skyBot:'#FF6F00', ground:'#2d5a10', strokeColor:'#FF8A65', outlineColor:'#1a1000', uiBorder:'#FF5722',  stars:false, clouds:true,  cloudColor:'#FF7043', fog:false },
  { id:'dusk',      name:'🌆 傍晚', isDay:false, skyTop:'#1A237E', skyBot:'#4527A0', ground:'#1a2e10', strokeColor:'#CE93D8', outlineColor:'#0d0d20', uiBorder:'#7E57C2',  stars:true,  clouds:false, cloudColor:'',       fog:false },
  { id:'night',     name:'🌙 星夜', isDay:false, skyTop:'#0D0D2B', skyBot:'#0A1628', ground:'#0d1a08', strokeColor:'#80D8FF', outlineColor:'#050515', uiBorder:'#0288D1',  stars:true,  clouds:false, cloudColor:'',       fog:false },
  { id:'moon',      name:'🌕 满月', isDay:false, skyTop:'#1B2A3B', skyBot:'#0D1B2A', ground:'#101d08', strokeColor:'#B2EBF2', outlineColor:'#080c18', uiBorder:'#26C6DA',  stars:true,  clouds:false, cloudColor:'',       fog:false },
  { id:'rain',      name:'🌧️ 雨夜', isDay:false, skyTop:'#263238', skyBot:'#37474F', ground:'#0d1508', strokeColor:'#80CBC4', outlineColor:'#0a1012', uiBorder:'#26A69A',  stars:false, clouds:true,  cloudColor:'#546E7A', fog:true  },
  { id:'aurora',    name:'🌌 极光', isDay:false, skyTop:'#004D40', skyBot:'#0D1B2A', ground:'#0a1005', strokeColor:'#A5D6A7', outlineColor:'#021008', uiBorder:'#43A047',  stars:true,  clouds:false, cloudColor:'',       fog:false },
];
const THEME_INTERVAL = 10 * 60 * 1000;
let lastThemeId = null;

// ============================================================
//  角色行走动画（MC像素角色）
// ============================================================
const SPRITE_URLS = [
  'https://api.dicebear.com/7.x/pixel-art/svg?seed=steve&backgroundColor=b9e0ff',     // 蓝衣人
  'https://api.dicebear.com/7.x/pixel-art/svg?seed=alex&backgroundColor=ffdfba',       // 橙发女孩
  'https://api.dicebear.com/7.x/pixel-art/svg?seed=creeper&backgroundColor=b9f0d0',     // 绿色
  'https://api.dicebear.com/7.x/pixel-art/svg?seed=zombie&backgroundColor=cce0ff',      // 僵尸蓝
  'https://api.dicebear.com/7.x/pixel-art/svg?seed=slime&backgroundColor=baeecc',       // 史莱姆
  'https://api.dicebear.com/7.x/pixel-art/svg?seed=enderman&backgroundColor=3a3a5c',    // 黑紫色
  'https://api.dicebear.com/7.x/pixel-art/svg?seed=skeleton&backgroundColor=eee8d5',    // 骨白
  'https://api.dicebear.com/7.x/pixel-art/svg?seed=villager&backgroundColor=ffe0b2',     // 村民
];

const runningChars = [];
const RUN_AREA_H = 90;
const CHAR_SIZE   = 56; // px, matches 7 blocks @ 8px each
const PRELOAD_IMGS = SPRITE_URLS.map((url, i) => {
  const img = new Image();
  img.src = url;
  return img;
});

function spawnRunner() {
  const idx  = Math.floor(Math.random() * SPRITE_URLS.length);
  const dir  = Math.random() > 0.5 ? 1 : -1;
  const x0   = dir > 0 ? -CHAR_SIZE - 10 : window.innerWidth + 10;
  const y    = Math.random() * (RUN_AREA_H - CHAR_SIZE - 16) + 8;
  const spd  = 0.6 + Math.random() * 1.2; // px/frame
  const bob  = Math.random() * Math.PI * 2; // 行走摇晃相位
  runningChars.push({ idx, x: x0, y, spd, dir, bob, bobSpd: 0.08 + Math.random()*0.05 });
}

function drawRunners() {
  const area = document.getElementById('char-run-area');
  // 用 innerHTML + img（简单可靠，不依赖 Canvas 跨域）
  // 清理离开视口的
  const w = window.innerWidth;
  runningChars.forEach(c => {
    c.x += c.spd * c.dir;
    c.bob += c.bobSpd;
  });
  // 移除跑出屏幕的
  while (runningChars.length > 0) {
    const last = runningChars[runningChars.length - 1];
    if (last.x < -CHAR_SIZE * 2 || last.x > w + CHAR_SIZE * 2) {
      runningChars.pop();
    } else break;
  }
  // 保证有足够角色
  if (runningChars.length < 3 && Math.random() < 0.03) spawnRunner();

  // 用 CSS position 绝对定位 + animation（性能更好）
  area.innerHTML = runningChars.map(c => {
    const bobY = Math.sin(c.bob) * 3;
    const flip = c.dir < 0 ? 'scaleX(-1)' : '';
    return `<img src="${SPRITE_URLS[c.idx]}" style="
      position:absolute;
      left:${c.x}px;
      top:${c.y + bobY}px;
      width:${CHAR_SIZE}px;
      height:${CHAR_SIZE}px;
      transform:${flip};
      image-rendering:pixelated;
      filter: drop-shadow(0 3px 4px rgba(0,0,0,0.4));
      pointer-events:none;
      z-index:5;
    ">`;
  }).join('');

  requestAnimationFrame(drawRunners);
}

// 初始生成几个
for (let i = 0; i < 3; i++) {
  const c = {
    idx: Math.floor(Math.random() * SPRITE_URLS.length),
    x: 100 + i * 200,
    y: 8 + Math.random() * 20,
    spd: 0.6 + Math.random() * 0.8,
    dir: i % 2 === 0 ? 1 : -1,
    bob: Math.random() * Math.PI * 2,
    bobSpd: 0.08 + Math.random() * 0.04
  };
  runningChars.push(c);
}

drawRunners();

// ============================================================
//  背景画布（星星/云/雨/极光）
// ============================================================
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx    = bgCanvas.getContext('2d');
let bgParticles = [];
let bgAnim;

function resizeBg() {
  bgCanvas.width  = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeBg);
resizeBg();

function buildParticles(theme) {
  bgParticles = [];
  if (theme.stars) {
    for (let i = 0; i < 90; i++) {
      bgParticles.push({ x: Math.random()*bgCanvas.width, y: Math.random()*bgCanvas.height*0.72,
        r: Math.random()*2+1, a: Math.random(), spd: 0.005+Math.random()*0.01, t:'star' });
    }
  }
  if (theme.clouds) {
    for (let i = 0; i < 5; i++) {
      bgParticles.push({ x: Math.random()*bgCanvas.width, y: 30+Math.random()*110,
        w: 80+Math.random()*90, spd: 0.2+Math.random()*0.3, col: theme.cloudColor, t:'cloud' });
    }
  }
  if (theme.id === 'aurora') {
    for (let i = 0; i < 4; i++) {
      bgParticles.push({ x: Math.random()*bgCanvas.width, y: 20+Math.random()*130,
        w: 60+Math.random()*80, h: 90+Math.random()*110, h1: 110+Math.random()*80, t:'aurora',
        hue: 110+Math.random()*80, a: 0.12+Math.random()*0.1, tp: Math.random()*Math.PI*2 });
    }
  }
  if (theme.fog) {
    for (let i = 0; i < 3; i++) {
      bgParticles.push({ x: Math.random()*bgCanvas.width,
        y: bgCanvas.height*0.38+Math.random()*bgCanvas.height*0.3,
        w: 220+Math.random()*200, a: 0.07+Math.random()*0.06, spd: 0.05+Math.random()*0.08, t:'fog' });
    }
  }
  if (theme.id === 'rain') {
    for (let i = 0; i < 80; i++) {
      bgParticles.push({ x: Math.random()*bgCanvas.width, y: Math.random()*bgCanvas.height,
        len: 14+Math.random()*18, spd: 6+Math.random()*5, t:'rain' });
    }
  }
}

function drawBg(theme) {
  cancelAnimationFrame(bgAnim);
  buildParticles(theme);
  _drawBg(theme);
}

function _drawBg(theme) {
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  bgParticles.forEach(p => {
    if (p.t === 'star') {
      p.a += p.spd * (Math.random() > 0.5 ? 1 : -1);
      p.a = Math.max(0.1, Math.min(1, p.a));
      bgCtx.save();
      bgCtx.globalAlpha = p.a;
      bgCtx.fillStyle = '#fff';
      // 像素十字星
      bgCtx.fillRect(p.x-2, p.y,   4, 1);
      bgCtx.fillRect(p.x,   p.y-2, 1, 4);
      bgCtx.restore();
    } else if (p.t === 'cloud') {
      p.x += p.spd;
      if (p.x > bgCanvas.width+200) p.x = -200;
      bgCtx.save();
      bgCtx.globalAlpha = 0.78;
      bgCtx.fillStyle = p.col || '#fff';
      bgCtx.fillRect(p.x, p.y, p.w, p.w*0.38);
      bgCtx.fillRect(p.x+p.w*0.15, p.y-p.w*0.5, p.w*0.38, p.w*0.6);
      bgCtx.fillRect(p.x+p.w*0.48, p.y-p.w*0.3, p.w*0.25, p.w*0.48);
      bgCtx.restore();
    } else if (p.t === 'aurora') {
      p.tp += 0.003;
      const yo = Math.sin(p.tp)*22;
      const g = bgCtx.createLinearGradient(p.x, p.y+yo, p.x+p.w, p.y+p.h+yo);
      g.addColorStop(0, `hsla(${p.hue},80%,60%,0)`);
      g.addColorStop(0.5, `hsla(${p.hue},80%,60%,${p.a})`);
      g.addColorStop(1, `hsla(${p.hue+40},80%,60%,0)`);
      bgCtx.save();
      bgCtx.fillStyle = g;
      bgCtx.beginPath();
      bgCtx.ellipse(p.x+p.w/2, p.y+p.h/2+yo, p.w/2, p.h/2, 0, 0, Math.PI*2);
      bgCtx.fill();
      bgCtx.restore();
    } else if (p.t === 'fog') {
      p.x += p.sp;
      if (p.x > bgCanvas.width+300) p.x = -300;
      const g = bgCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.w);
      g.addColorStop(0, `rgba(180,200,220,${p.a})`);
      g.addColorStop(1, 'rgba(180,200,220,0)');
      bgCtx.save();
      bgCtx.fillStyle = g;
      bgCtx.fillRect(p.x-p.w, p.y-40, p.w*2, 80);
      bgCtx.restore();
    } else if (p.t === 'rain') {
      p.y += p.spd;
      if (p.y > bgCanvas.height) { p.y = -p.len; p.x = Math.random()*bgCanvas.width; }
      bgCtx.save();
      bgCtx.strokeStyle = 'rgba(160,200,255,0.35)';
      bgCtx.lineWidth = 1.5;
      bgCtx.beginPath();
      bgCtx.moveTo(p.x, p.y);
      bgCtx.lineTo(p.x - 2, p.y + p.len);
      bgCtx.stroke();
      bgCtx.restore();
    }
  });
  bgAnim = requestAnimationFrame(() => _drawBg(theme));
}

// ============================================================
//  主题应用
// ============================================================
function pickTheme() {
  const h = new Date().getHours();
  const pool = (h >= 6 && h < 18) ? THEMES.filter(t=>t.isDay) : THEMES.filter(t=>!t.isDay);
  // 清晨/黄昏过渡
  if (h >= 5 && h < 6) { const t = THEMES.find(t=>t.id==='dawn'); if(t) return t; }
  if (h >= 18 && h < 20){ const t = THEMES.find(t=>t.id==='sunset'); if(t) return t; }
  return pool[Math.floor(Date.now()/THEME_INTERVAL) % pool.length];
}

function applyTheme(theme) {
  document.body.style.background =
    `linear-gradient(180deg, ${theme.skyTop} 0%, ${theme.skyBot} 65%, ${theme.ground} 100%)`;
  const r = document.documentElement;
  r.style.setProperty('--stroke-color', theme.strokeColor);
  r.style.setProperty('--outline-color', theme.outlineColor);
  r.style.setProperty('--ui-border', theme.uiBorder);
  r.style.setProperty('--ground', theme.ground);
  if (theme.isDay) document.body.classList.remove('night-mode');
  else             document.body.classList.add('night-mode');
  if (writer) {
    writer.updateColor('strokeColor', theme.strokeColor);
    writer.updateColor('outlineColor', theme.outlineColor);
  }
  drawBg(theme);
  if (lastThemeId !== theme.id) {
    lastThemeId = theme.id;
  }
}

// ============================================================
//  时钟 & 计时器
// ============================================================
const pageStart = Date.now();

function updateTimes() {
  // 北京时间
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('beijing-time').textContent = `${hh}:${mm}:${ss}`;

  // 已打开时长
  const diff = Date.now() - pageStart;
  const totalSec = Math.floor(diff / 1000);
  const openH = String(Math.floor(totalSec / 3600)).padStart(2,'0');
  const openM = String(Math.floor((totalSec % 3600) / 60)).padStart(2,'0');
  const openS = String(totalSec % 60).padStart(2,'0');
  document.getElementById('page-duration').textContent = `已打开 ${openH}:${openM}:${openS}`;
}

// ============================================================
//  主题定时轮换
// ============================================================
function checkTheme() {
  const t = pickTheme();
  if (t.id !== lastThemeId) applyTheme(t);
}
applyTheme(pickTheme());
setInterval(checkTheme, 10000);
setInterval(updateTimes, 1000);
updateTimes();

function showChar(char) {
  console.log('[showChar] 尝试显示汉字:', char);
  const info = DB[char];
  errorMsg.textContent = '';
  if (info) {
    console.log('[showChar] 找到数据:', info);
    controls.style.display = 'flex';

    renderWriter(char);
  } else {
    console.warn('[showChar] 数据库未找到汉字:', char);
    controls.style.display = 'none';
    pinyinShow.textContent = '';
    wordsShow.innerHTML = '';
    errorMsg.textContent = `暂不支持汉字 "${char}" 的笔顺数据`;
    charTarget.innerHTML = '<div class="placeholder-char">字</div>';
    writer = null;
  }
}

function resetDisplay() {
  console.log('[resetDisplay] 重置显示');
  controls.style.display = 'none';
  pinyinShow.textContent = '';
  wordsShow.innerHTML = '';
  errorMsg.textContent = '';
  charTarget.innerHTML = '<div class="placeholder-char">字</div>';
  writer = null;
}

// 输入事件 + 输入法组合守卫
// compositionstart/end 用于屏蔽拼音输入法中间状态
let isComposing = false;

charInput.addEventListener('compositionstart', function() {
  isComposing = true;
});

charInput.addEventListener('compositionend', function() {
  isComposing = false;
  // 组合结束后触发显示
  const val = this.value.trim();
  console.log('[compositionend] 输入法确认，值:', val);
  if (val.length > 0) {
    showChar(val[0]);
  } else {
    resetDisplay();
  }
});

charInput.addEventListener('input', function() {
  if (isComposing) return; // 正在用输入法组合，跳过
  console.log('[input事件] 触发，值:', this.value);
  const val = this.value.trim();
  if (val.length > 0) {
    showChar(val[0]);
  } else {
    resetDisplay();
  }
});

async function renderWriter(char) {
  console.log('[renderWriter] 创建汉字:', char);

  if (typeof HanziWriter === 'undefined') {
    console.error('[renderWriter] ❌ HanziWriter 未定义');
    errorMsg.textContent = '汉字书写库加载失败，请刷新页面重试';
    return;
  }

  // 清理旧实例并重置容器
  writer = null;
  charTarget.innerHTML = '';

  const theme = pickTheme();
  const isMobile = window.innerWidth <= 480;
  const size = isMobile ? 220 : 260;

  try {
    // HanziWriter 3.x: create() 返回 Promise，必须 await 拿到实例
    const instance = await HanziWriter.create('character-target', char, {
      width: size,
      height: size,
      padding: Math.round(size * 0.045),
      showOutline: true,
      showCharacter: false,
      strokeColor: theme.strokeColor,
      outlineColor: theme.outlineColor,
      strokeAnimationSpeed: 1,
      delayBetweenStrokes: 150,
    });
    writer = instance;
    console.log('[renderWriter] ✅ 实例创建成功，开始动画');
    writer.animateCharacter();
  } catch(err) {
    console.error('[renderWriter] ❌ 创建或加载失败:', err);
    errorMsg.textContent = '笔顺数据加载失败，请检查网络';
  }
}

document.getElementById('btn-replay').addEventListener('click', function() {
  if (writer) { writer.hideCharacter(); writer.animateCharacter(); }
});
document.getElementById('btn-show').addEventListener('click', function() {
  if (writer) writer.showCharacter();
});

// ============================================================
//  PWA 安装（使用 addEventListener）
// ============================================================
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', function(e) {
  console.log('[PWA] beforeinstallprompt 事件触发');
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-btn').style.display = 'inline-flex';
  document.getElementById('install-banner').style.display = 'flex';
});

function installApp() {
  console.log('[PWA] 触发安装');
  document.getElementById('install-banner').style.display = 'none';
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function() {
      deferredPrompt = null;
      document.getElementById('install-btn').style.display = 'none';
    });
  }
}
function dismissBanner() {
  console.log('[PWA] 关闭横幅');
  document.getElementById('install-banner').style.display = 'none';
}

// iOS
function isIOS() { return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream; }
function isStandalone() { return window.navigator.standalone === true; }
if (isIOS() && !isStandalone()) {
  document.getElementById('ios-install-btn').style.display = 'inline-flex';
}
function toggleIOSHint() {
  console.log('[PWA] 切换 iOS 提示');
  var hint = document.getElementById('ios-hint');
  hint.style.display = hint.style.display === 'flex' ? 'none' : 'flex';
}

// 使用 addEventListener 绑定安装按钮
document.getElementById('install-btn').addEventListener('click', function() {
  installApp();
});
document.getElementById('ios-install-btn').addEventListener('click', function() {
  toggleIOSHint();
});
document.getElementById('banner-install-btn').addEventListener('click', function() {
  installApp();
});
document.getElementById('banner-dismiss-btn').addEventListener('click', function() {
  dismissBanner();
});
document.addEventListener('click', function(e) {
  var hint = document.getElementById('ios-hint');
  if (hint.style.display === 'flex' && !e.target.closest('#ios-hint') && !e.target.closest('#ios-install-btn')) {
    hint.style.display = 'none';
  }
});

// 自动聚焦
window.addEventListener('load', function() { charInput.focus(); });
</script>
