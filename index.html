<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>拼音汉字展示</title>
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      color: #fff;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 1.5rem;
      color: #e2e2e2;
      font-weight: 300;
    }

    .input-container {
      width: 100%;
      max-width: 500px;
      margin-bottom: 30px;
    }

    .input-label {
      display: block;
      font-size: 0.9rem;
      color: #a0a0a0;
      margin-bottom: 8px;
    }

    .pinyin-input {
      width: 100%;
      padding: 18px 24px;
      font-size: 1.8rem;
      border: 3px solid #4a90d9;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.95);
      color: #1a1a2e;
      text-align: center;
      outline: none;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .pinyin-input:focus {
      border-color: #00d9ff;
      box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
    }

    .pinyin-input::placeholder {
      color: #888;
      font-size: 1.4rem;
    }

    .display-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 600px;
    }

    .character-display {
      width: 280px;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #character-target {
      width: 100%;
      height: 100%;
    }

    .pinyin-display {
      font-size: 2.5rem;
      font-weight: 300;
      color: #00d9ff;
      margin: 20px 0;
      letter-spacing: 0.1em;
      text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
    }

    .words-display {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .word-item {
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      font-size: 1.4rem;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
      cursor: default;
    }

    .word-item:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .placeholder-text {
      font-size: 8rem;
      color: rgba(255, 255, 255, 0.15);
      user-select: none;
    }

    .controls {
      margin-top: 30px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 12px 28px;
      font-size: 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      font-weight: 500;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4a90d9, #00d9ff);
      color: #fff;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .error-message {
      color: #ff6b6b;
      font-size: 1rem;
      margin-top: 15px;
      text-align: center;
      min-height: 24px;
    }

    .hint {
      margin-top: 20px;
      font-size: 0.85rem;
      color: #666;
      text-align: center;
    }

    /* 移动端优化 */
    @media (max-width: 480px) {
      body {
        padding: 15px;
      }

      .pinyin-input {
        font-size: 1.5rem;
        padding: 15px 20px;
      }

      .character-display {
        width: 240px;
        height: 240px;
      }

      .pinyin-display {
        font-size: 2rem;
      }

      .word-item {
        font-size: 1.2rem;
        padding: 10px 18px;
      }

      .btn {
        padding: 10px 20px;
        font-size: 0.9rem;
      }
    }

    /* 动画 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
      animation: fadeIn 0.4s ease;
    }

    /* 深色主题切换按钮 */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.3s;
    }

    .theme-toggle:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>拼音汉字笔顺展示</h1>
  </div>

  <div class="input-container">
    <label class="input-label">输入拼音（回车确认）</label>
    <input 
      type="text"

      class="pinyin-input" 
      placeholder="例：han"
      autocomplete="off"
      autofocus
    >
  </div>

  <div class="display-area">
    <div class="character-display">
      <div id="character-target">
        <span class="placeholder-text">字</span>
      </div>
    </div>
    
    <div class="pinyin-display" id="pinyinShow"></div>
    
    <div class="words-display" id="wordsShow"></div>
    
    <div class="error-message" id="errorMsg"></div>
    
    <div class="controls" id="controls" style="display: none;">

      <button class="btn btn-secondary" onclick="showCharacter()">📝 显示全字</button>
    </div>
  </div>

    document.getElementById('pinyinInput').addEventListener('keypress', function(e) {

        if (pinyin) {
          showCharacterByPinyin(pinyin);
        }
      }
    });

    // 根据拼音显示汉字
    function showCharacterByPinyin(pinyin) {
      const charInfo = charDatabase[pinyin];
      const errorMsg = document.getElementById('errorMsg');
      const controls = document.getElementById('controls');
      
      if (charInfo) {
        currentChar = charInfo.char;
        errorMsg.textContent = '';
        controls.style.display = 'flex';
        
        // 显示笔顺动画
        showStrokeAnimation(charInfo.char);
        
        // 显示拼音（带声调）
        document.getElementById('pinyinShow').textContent = getPinyinWithTone(pinyin);
        document.getElementById('pinyinShow').className = 'pinyin-display fade-in';
        
        // 显示组词
        const wordsHtml = charInfo.words.map(w => `<span class="word-item fade-in">${w}</span>`).join('');
        document.getElementById('wordsShow').innerHTML = wordsHtml;
        
      } else {
        errorMsg.textContent = `抱歉，数据库中未找到拼音 "${pinyin}" 对应的汉字`;
        document.getElementById('pinyinShow').textContent = '';
        document.getElementById('wordsShow').innerHTML = '';
        controls.style.display = 'none';
        
        // 清除显示
        document.getElementById('character-target').innerHTML = '<span class="placeholder-text">字</span>';
      }
    }

    // 显示笔顺动画
    function showStrokeAnimation(char) {
      const target = document.getElementById('character-target');
      target.innerHTML = '';
      
      writer = HanziWriter.create('character-target', char, {
        width: 280,
        height: 280,
        padding: 10,
        showOutline: true,
        showCharacter: false,
        strokeColor: '#00d9ff',
        outlineColor: '#335577',
        drawingColor: '#00d9ff',
        strokeAnimationSpeed: 1,
        delayBetweenStrokes: 200,
        onLoadCharDataSuccess: function(data) {
          writer.animateCharacter();
        },
        onLoadCharDataError: function(reason) {
          document.getElementById('errorMsg').textContent = '笔顺数据加载失败，请检查网络连接';
        }
      });
    }

    // 重播动画
    function replayAnimation() {
      if (writer) {
        writer.hideCharacter();
        writer.animateCharacter();
      }
    }

    // 显示完整汉字
    function showCharacter() {
      if (writer) {
        writer.animateCharacter();
      }
    }
